<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mensagem Secreta | Desbloqueie sua mensagem</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Particles background -->
    <div class="particles" id="particles"></div>
    
    <div class="main-content">
        <div class="container">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm3 8H9V7c0-1.654 1.346-3 3-3s3 1.346 3 3v3z" fill="currentColor"/>
                    <circle cx="12" cy="16" r="2" fill="currentColor"/>
                </svg>
            </div>
            
            <h1 class="title">Mensagem Secreta</h1>
            <p class="subtitle">Digite a senha para desbloquear</p>
            
            <form id="senha-form" class="senha-form">
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="senha" 
                        placeholder="••••••••" 
                        autocomplete="off"
                        spellcheck="false"
                    />
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="Mostrar senha">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5C7 5 2.73 8.11 1 12.5 2.73 16.89 7 20 12 20s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill="currentColor"/>
                            <circle cx="12" cy="12.5" r="2.5" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                
                <button type="submit" class="btn-submit" id="btn-submit">
                    <span class="btn-text">Desbloquear</span>
                    <span class="btn-loader"></span>
                </button>
            </form>
            
            <div id="mensagem-container" class="mensagem-container hidden">
                <div class="mensagem-header">
                    <div class="status-badge">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                        </svg>
                        <span>Desbloqueado</span>
                    </div>
                </div>
                <div class="mensagem-content">
                    <h2 class="mensagem-titulo" id="mensagem-titulo"></h2>
                    <p class="mensagem-para" id="mensagem-para"></p>
                    <div class="mensagem-texto" id="mensagem-texto"></div>
                </div>
            </div>
            
            <div id="error-message" class="error-message hidden">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/>
                </svg>
                <span id="error-text"></span>
            </div>
        </div>
        
        <footer class="footer">
            Feito com <span class="heart">❤️</span> por
            <a href="https://links.johnnick.com.br" target="_blank" rel="noopener noreferrer">Johnnick F Landim</a>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
