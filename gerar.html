<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Mensagens Criptografadas</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .generator-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 14px 18px;
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-textarea {
            resize: vertical;
            min-height: 150px;
            line-height: 1.6;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px var(--shadow);
        }

        .resultado-box {
            margin-top: 32px;
            padding: 20px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
            position: relative;
        }

        .resultado-box pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        .copy-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .copy-btn svg {
            width: 16px;
            height: 16px;
        }

        .resultado-box::-webkit-scrollbar {
            width: 8px;
        }

        .resultado-box::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }

        .resultado-box::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .resultado-box::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .success-toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--success);
            color: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
        }

        .success-toast.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-toast svg {
            width: 20px;
            height: 20px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .generator-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .generator-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 32px;
        }

        @media (max-width: 640px) {
            .generator-container {
                padding: 24px 20px;
            }

            .generator-title {
                font-size: 24px;
            }

            .copy-btn {
                position: static;
                margin-top: 12px;
                width: 100%;
                justify-content: center;
            }

            .success-toast {
                left: 16px;
                right: 16px;
                top: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="main-content">
        <div class="container generator-container">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 8h-1V6c0-2.76-2.24-5-5-5S8 3.24 8 6v2H7c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-7 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z" fill="currentColor"/>
                </svg>
            </div>

            <h1 class="generator-title">Gerador de Mensagens</h1>
            <p class="generator-subtitle">Crie mensagens secretas criptografadas</p>

            <form id="gerador-form">
                <div class="form-group">
                    <label class="form-label" for="titulo">Título da Mensagem</label>
                    <input 
                        type="text" 
                        id="titulo" 
                        class="form-input"
                        placeholder="Ex: Feliz Aniversário!" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="nome">Nome do Destinatário</label>
                    <input 
                        type="text" 
                        id="nome" 
                        class="form-input"
                        placeholder="Ex: Maria" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="senha">Senha (usado para criptografia)</label>
                    <input 
                        type="text" 
                        id="senha" 
                        class="form-input"
                        placeholder="Digite uma senha forte" 
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="texto">Mensagem Secreta</label>
                    <textarea 
                        id="texto" 
                        class="form-textarea"
                        placeholder="Digite sua mensagem aqui..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="btn-text">Gerar JSON Criptografado</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div id="resultado-container" style="display: none;">
                <div class="resultado-box">
                    <button class="copy-btn" id="copy-btn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                        </svg>
                        Copiar
                    </button>
                    <pre id="resultado"></pre>
                </div>
            </div>
        </div>

        <footer class="footer">
            Feito com <span class="heart">❤️</span> por
            <a href="https://links.johnnick.com.br" target="_blank" rel="noopener noreferrer">Johnnick F Landim</a>
        </footer>
    </div>

    <div class="success-toast" id="success-toast">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
        </svg>
        <span id="toast-text">JSON copiado com sucesso!</span>
    </div>

    <script src="gerar.js"></script>
</body>
</html>
